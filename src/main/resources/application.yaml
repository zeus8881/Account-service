spring:
  application:
    name: mySpringProject

  docker:
    compose:
      enabled: false

  datasource:
    url: jdbc:postgresql://192.168.0.199:5432/mydb
    username: postgres
    password: 123
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update

logging:
  level:
    org:
      postgresql: DEBUG

server:
  ssl:
    enabled: true
    key-store-type: PKCS12
    key-store: classpath:keystore/keystore.p12
    key-store-password: service
    key-alias: accountant_service
  port: 8088
